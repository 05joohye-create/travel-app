<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Travel App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="hero">
<div class="small">🇯🇵 일본 여행</div>
<h1>D-115</h1>
<div>2026.10.28 ~ 2026.11.10</div>
</div>

<div class="card">
<h3>📝 준비 현황</h3>
<div class="progress"><div class="fill"></div></div>
<p><strong>65%</strong></p>
<ul>
<li>☐ eSIM</li>
<li>☐ 여행자보험</li>
<li>☐ 환전</li>
</ul>
</div>

<div class="card">
<h3>💳 사전 결제</h3>
<div class="row"><span>항공권</span><span>✅</span></div>
<div class="row"><span>숙소</span><span>✅</span></div>
<div class="row"><span>JR PASS</span><span>🟡</span></div>
</div>

<div class="card">
<h3>💰 공동 여행비</h3>
<h2>₩1,285,400</h2>
<p>실제 부담금 기준</p>
</div>

<div class="card">
<h3>⚖️ 결제 균형</h3>
<div class="row"><span>주혜</span><strong>+326,500원</strong></div>
<div class="row"><span>정은</span><strong>-326,500원</strong></div>
<p>💡 다음 공동 결제 : 정은</p>
</div>

<button>➕ 결제 등록</button>

<div class="tabbar">🏠 💳 💴 🧮 ⚙️</div>
</div>
<script src="app.js"></script>
</body>
</html>
